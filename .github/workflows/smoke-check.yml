name: Smoke Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run smoke check
        run: python3 scripts/smoke_check.py

      - name: Export Streisand rules (offline)
        run: python3 scripts/export_streisand_rules.py --offline
