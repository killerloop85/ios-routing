# RU Split Routing
# Parity-oriented split profile: local and RU direct, blocked core and foreign services via proxy.
# status: experimental
# intended-use: parity
port: 7890
socks-port: 7891
mode: Rule
allow-lan: true
log-level: info
proxies: []
proxy-groups:
  - name: "PROXY"
    type: select
    include-all: true
    proxies:
      - "DIRECT"
  - name: "DIRECT"
    type: select
    proxies:
      - "DIRECT"
