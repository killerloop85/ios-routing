services:
  office-vpn:
    image: ghcr.io/sagernet/sing-box:v1.12.0
    container_name: office-vpn
    restart: unless-stopped
    network_mode: bridge
    command: ["run", "-c", "/etc/sing-box/config.json"]
    env_file:
      - .env
    environment:
      ENABLE_DEPRECATED_SPECIAL_OUTBOUNDS: "true"
    ports:
      - "${OFFICE_LAN_BIND_IP:-10.77.221.15}:${MIXED_PORT:-1080}:${MIXED_PORT:-1080}/tcp"
      - "${OFFICE_LAN_BIND_IP:-10.77.221.15}:${MIXED_PORT:-1080}:${MIXED_PORT:-1080}/udp"
    volumes:
      - ./config/config.json:/etc/sing-box/config.json:ro
      - ./logs:/var/log/sing-box
    healthcheck:
      test: ["CMD", "sing-box", "check", "-c", "/etc/sing-box/config.json"]
      interval: 30s
      timeout: 10s
      retries: 3

  office-pac:
    image: nginx:alpine
    container_name: office-pac
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "${OFFICE_LAN_BIND_IP:-10.77.221.15}:${PAC_PORT:-8088}:80/tcp"
    volumes:
      - ./proxy.pac:/usr/share/nginx/html/proxy.pac:ro
      - ./pac.nginx.conf:/etc/nginx/conf.d/default.conf:ro
