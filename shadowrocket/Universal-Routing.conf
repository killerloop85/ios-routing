[General]
bypass-system = true
dns-server = system
skip-proxy = 127.0.0.1, localhost, ::1
always-real-ip = *.lan, localhost
ipv6 = false

[Rule]
# 0. Локалка и служебные сети — всегда DIRECT
IP-CIDR,127.0.0.0/8,DIRECT
IP-CIDR,10.0.0.0/8,DIRECT
IP-CIDR,172.16.0.0/12,DIRECT
IP-CIDR,192.168.0.0/16,DIRECT
IP-CIDR,100.64.0.0/10,DIRECT
DOMAIN,localhost,DIRECT
DOMAIN-SUFFIX,local,DIRECT
DOMAIN-SUFFIX,lan,DIRECT

# 1. Ядро RU-блокировок — принудительно через VPN
RULE-SET,https://raw.githubusercontent.com/killerloop85/ios-routing/main/shadowrocket/ru-blocked-core.list,PROXY

# 2. Российский whitelist / «соцзначимые» — DIRECT
RULE-SET,https://raw.githubusercontent.com/killerloop85/ios-routing/main/shadowrocket/ru-direct.list,DIRECT

# 3. Зарубежные сервисы, которые лучше всегда через VPN
RULE-SET,https://raw.githubusercontent.com/killerloop85/ios-routing/main/shadowrocket/foreign-services.list,PROXY

# 4. Все IP РФ — DIRECT (подстраховка)
GEOIP,RU,DIRECT

# 5. Всё остальное — через активный прокси
FINAL,PROXY
